plugins {
    id 'java-library'
    id 'net.neoforged.moddev' version '2.0.78'
}

group = 'com.example.hell_yeah_stuff'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

neoForge {
    version = '21.1.77'

    runs {
        client {
            client()
        }
        server {
            server()
        }
    }

    mods {
        hell_yeah_stuff {
            sourceSet(sourceSets.main)
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
